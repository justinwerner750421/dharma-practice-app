<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行筆記</title>
    <!-- 引入穩定的程式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <!-- Recharts 需要在 React 之後載入 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 修正 Lucide 載入方式 -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --main-bg: #FDFCFB; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--main-bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .recharts-responsive-container { min-height: 250px; }
        /* 增加刪除按鈕的呼吸效果 */
        .delete-btn { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, 
            Tooltip, ResponsiveContainer 
        } = window.Recharts;

        // 建立一個簡單的圖示組件
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const INITIAL_PRACTICES = [
            { id: '1', title: '金光明經', total: 0, color: '#d97706' },
            { id: '2', title: '蓮師心咒', total: 0, color: '#dc2626' }
        ];
        const STORAGE_KEY = 'spiritual_practice_journal_v2';

        function App() {
            const [practices, setPractices] = useState(INITIAL_PRACTICES);
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('home');
            const [selectedPracticeId, setSelectedPracticeId] = useState(null);
            const [isAddLogOpen, setIsAddLogOpen] = useState(false);
            const [isAddPracticeOpen, setIsAddPracticeOpen] = useState(false);
            const [isDeleteMode, setIsDeleteMode] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            const [inputCount, setInputCount] = useState('');
            const [inputNote, setInputNote] = useState('');
            const [newPracticeTitle, setNewPracticeTitle] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setPractices(parsed.practices || INITIAL_PRACTICES);
                        setLogs(parsed.logs || []);
                    } catch (e) { console.error("Data load failed", e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ practices, logs }));
                if (window.lucide) window.lucide.createIcons();
            }, [practices, logs, activeTab, isAddLogOpen, isAddPracticeOpen, isDeleteMode, confirmDeleteId]);

            const handleAddLog = () => {
                if (!selectedPracticeId || (!inputCount && !inputNote)) return;
                const count = parseInt(inputCount) || 0;
                const newEntry = {
                    id: Date.now().toString(),
                    practiceId: selectedPracticeId,
                    count: count,
                    note: inputNote.trim(),
                    date: new Date().toISOString()
                };
                setLogs([newEntry, ...logs]);
                if (count > 0) {
                    setPractices(prev => prev.map(p => p.id === selectedPracticeId ? { ...p, total: p.total + count } : p));
                }
                setInputCount(''); setInputNote(''); setIsAddLogOpen(false);
            };

            const handleAddPractice = () => {
                if (!newPracticeTitle.trim()) return;
                const colors = ['#d97706', '#dc2626', '#7c3aed', '#059669', '#2563eb'];
                setPractices(prev => [...prev, {
                    id: Date.now().toString(),
                    title: newPracticeTitle,
                    total: 0,
                    color: colors[prev.length % colors.length]
                }]);
                setNewPracticeTitle(''); setIsAddPracticeOpen(false);
            };

            const handleDeletePractice = (id) => {
                setPractices(prev => prev.filter(p => p.id !== id));
                setLogs(prev => prev.filter(l => l.practiceId !== id));
                setConfirmDeleteId(null);
                if (practices.length <= 1) setIsDeleteMode(false);
            };

            const stats = useMemo(() => {
                const now = new Date();
                const getHistory = (days) => {
                    const dataMap = {};
                    for (let i = 0; i < days; i++) {
                        const d = new Date(); d.setDate(now.getDate() - i);
                        dataMap[d.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' })] = 0;
                    }
                    logs.forEach(l => {
                        const label = new Date(l.date).toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
                        if (dataMap[label] !== undefined) dataMap[label] += l.count;
                    });
                    return Object.entries(dataMap).map(([name, value]) => ({ name, value })).reverse();
                };
                const sumRange = (m) => {
                    const d = new Date(); d.setMonth(now.getMonth() - m);
                    return logs.filter(l => new Date(l.date) >= d).reduce((s, l) => s + l.count, 0);
                };
                return { chart: getHistory(30), q: sumRange(3), s: sumRange(6), y: sumRange(12) };
            }, [logs]);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative">
                    <header className="bg-white/90 backdrop-blur-md border-b border-stone-100 px-6 py-5 sticky top-0 z-10 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="bg-stone-800 p-1.5 rounded-lg flex items-center justify-center">
                                <Icon name="book-open" size={18} className="text-white" />
                            </div>
                            <span className="text-xl font-bold tracking-tight">修行筆記</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button 
                                onClick={() => setIsDeleteMode(!isDeleteMode)} 
                                className={`w-10 h-10 flex items-center justify-center rounded-full transition-all ${isDeleteMode ? 'bg-red-100 text-red-600' : 'bg-stone-50 text-stone-400'}`}
                            >
                                <Icon name={isDeleteMode ? "check" : "trash-2"} size={18} />
                            </button>
                            <button onClick={() => setIsAddPracticeOpen(true)} className="w-10 h-10 flex items-center justify-center bg-stone-100 rounded-full active:scale-90 transition-all">
                                <Icon name="plus" size={20} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <section>
                                    <h2 className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-4 flex justify-between">
                                        <span>今日修持</span>
                                        {isDeleteMode && <span className="text-red-500 font-bold animate-pulse">管理模式開啟中</span>}
                                    </h2>
                                    <div className="space-y-3">
                                        {practices.map(p => (
                                            <div key={p.id} className="relative">
                                                <div 
                                                    onClick={() => { if(!isDeleteMode) { setSelectedPracticeId(p.id); setIsAddLogOpen(true); } }} 
                                                    className={`bg-white p-5 rounded-3xl border border-stone-100 shadow-sm flex justify-between items-center transition-all ${isDeleteMode ? 'opacity-50 grayscale' : 'cursor-pointer active:bg-stone-50'}`}
                                                >
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-1.5 h-10 rounded-full" style={{ backgroundColor: p.color }}></div>
                                                        <div><h3 className="font-bold text-stone-700">{p.title}</h3><p className="text-stone-400 text-xs">累計 {p.total.toLocaleString()}</p></div>
                                                    </div>
                                                    {!isDeleteMode && <Icon name="plus" size={16} className="text-stone-300" />}
                                                </div>
                                                {isDeleteMode && (
                                                    <button 
                                                        onClick={() => setConfirmDeleteId(p.id)}
                                                        className="absolute right-4 top-1/2 -translate-y-1/2 bg-red-500 text-white p-3 rounded-full shadow-lg delete-btn"
                                                    >
                                                        <Icon name="x" size={16} />
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </section>
                                <section>
                                    <h2 className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-4">最近隨筆</h2>
                                    <div className="space-y-4">
                                        {logs.slice(0, 8).map(l => (
                                            <div key={l.id} className="bg-white p-5 rounded-3xl border border-stone-100 shadow-sm">
                                                <div className="flex justify-between text-[10px] text-stone-400 mb-2 font-bold uppercase">
                                                    <span>{practices.find(p => p.id === l.practiceId)?.title || '已移除'}</span>
                                                    <span>{new Date(l.date).toLocaleDateString()}</span>
                                                </div>
                                                {l.count > 0 && <p className="text-lg font-serif font-bold text-amber-600 mb-1">{l.count} 遍</p>}
                                                {l.note && <div className="flex gap-2 text-stone-600 text-sm italic border-t border-stone-50 pt-2 mt-1">
                                                    <Icon name="message-square" size={14} className="mt-1 shrink-0 opacity-50" />
                                                    {l.note}
                                                </div>}
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="space-y-6 animate-in zoom-in-95 duration-500">
                                <div className="grid grid-cols-3 gap-3">
                                    {[ ['本季', stats.q], ['半年', stats.s], ['年度', stats.y] ].map(([l, v], i) => (
                                        <div key={i} className="bg-white p-4 rounded-2xl border border-stone-100 text-center shadow-sm">
                                            <p className="text-[10px] text-stone-400 mb-1 font-bold">{l}</p>
                                            <p className="text-lg font-bold text-stone-800">{v.toLocaleString()}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm">
                                    <h3 className="text-xs font-bold text-stone-500 mb-6 uppercase tracking-widest">精進曲線 (30D)</h3>
                                    <div className="h-64 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={stats.chart}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: '#A8A29E' }} minTickGap={30} />
                                                <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: '#A8A29E' }} />
                                                <Tooltip contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)' }} />
                                                <Area type="monotone" dataKey="value" stroke="#d97706" fill="#fef3c7" strokeWidth={3} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-xl border-t border-stone-100 flex justify-around py-4 pb-8 z-20">
                        <button onClick={() => {setActiveTab('home'); setIsDeleteMode(false);}} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'home' ? 'text-stone-900 scale-110' : 'text-stone-300'}`}>
                            <Icon name="calendar" size={22} />
                            <span className="text-[10px] font-bold">修持</span>
                        </button>
                        <button onClick={() => {setActiveTab('stats'); setIsDeleteMode(false);}} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'stats' ? 'text-stone-900 scale-110' : 'text-stone-300'}`}>
                            <Icon name="bar-chart-3" size={22} />
                            <span className="text-[10px] font-bold">數據</span>
                        </button>
                    </nav>

                    {/* 二次確認彈窗 */}
                    {confirmDeleteId && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="alert-triangle" size={32} />
                                </div>
                                <h3 className="text-xl font-bold mb-2">確定刪除嗎？</h3>
                                <p className="text-stone-400 text-sm mb-8 leading-relaxed">
                                    刪除「{practices.find(p => p.id === confirmDeleteId)?.title}」將會連同所有歷史修持紀錄一併清除，且無法復原。
                                </p>
                                <div className="space-y-3">
                                    <button 
                                        onClick={() => handleDeletePractice(confirmDeleteId)}
                                        className="w-full bg-red-500 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-red-100"
                                    >
                                        確定移除
                                    </button>
                                    <button 
                                        onClick={() => setConfirmDeleteId(null)}
                                        className="w-full text-stone-400 py-2 font-bold"
                                    >
                                        取消
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isAddLogOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-end justify-center">
                            <div className="bg-[#FDFCFB] w-full max-w-md rounded-t-[3rem] p-10 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-bold tracking-tight">紀錄修持</h3>
                                    <button onClick={() => setIsAddLogOpen(false)} className="bg-stone-100 p-2 rounded-full"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-2 block">完成遍數</label>
                                        <input type="number" autoFocus value={inputCount} onChange={(e) => setInputCount(e.target.value)} placeholder="0" className="w-full text-6xl font-serif font-bold text-amber-600 bg-transparent border-b-2 border-stone-100 py-4 focus:outline-none focus:border-stone-800 transition-colors" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-2 block">當下心境</label>
                                        <textarea value={inputNote} onChange={(e) => setInputNote(e.target.value)} placeholder="寫下感悟..." rows={3} className="w-full bg-stone-50 rounded-[1.5rem] p-5 text-stone-700 outline-none focus:ring-2 ring-stone-100 transition-all resize-none" />
                                    </div>
                                    <button onClick={handleAddLog} className="w-full bg-stone-800 text-white py-5 rounded-[2rem] font-bold text-lg active:scale-95 transition-all">存入日誌</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isAddPracticeOpen && (
                        <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
                                <h3 className="text-xl font-bold mb-6">新增法門</h3>
                                <input type="text" autoFocus value={newPracticeTitle} onChange={(e) => setNewPracticeTitle(e.target.value)} placeholder="法門名稱" className="w-full border-2 border-stone-50 bg-stone-50 rounded-2xl p-4 mb-8 outline-none focus:bg-white focus:border-stone-800 transition-all" />
                                <div className="flex gap-3">
                                    <button onClick={() => setIsAddPracticeOpen(false)} className="flex-1 py-4 font-bold text-stone-400">取消</button>
                                    <button onClick={handleAddPractice} className="flex-2 bg-stone-800 text-white px-8 py-4 rounded-2xl font-bold">新增</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
